# The Site Configuration

theme: jekyll-theme-chirpy

lang: en

timezone: America/Santiago

title: Francisco Frez
tagline: Data Engineer | Python | SQL | GCP

description: >-
  Personal blog of Francisco Frez Rojas — Data Engineer sharing insights
  about data engineering, GCP, Python, and technology.

url: "https://ffrezr.github.io"

github:
  username: ffrezr

social:
  name: Francisco Frez Rojas
  email: ffrez.rojas@gmail.com
  links:
    - https://github.com/ffrezr
    - https://linkedin.com/in/francisco-frez-rojas
    - https://medium.com/@franciscofrez

avatar: "/assets/img/avatar.jpg"

toc: true

comments:
  provider:

analytics:
  google:
    id:

pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

baseurl: ""

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
